name: Lint PowerShell

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Get-ChildItem -Recurse -Filter *.ps1 |
            Invoke-ScriptAnalyzer -Severity Error, Warning -Settings PSScriptAnalyzerSettings.psd1

          if ($results) {
            $results | Format-Table -AutoSize
            Write-Host "PSScriptAnalyzer found $($results.Count) issue(s)." -ForegroundColor Red
            exit 1
          } else {
            Write-Host "PSScriptAnalyzer: no issues found." -ForegroundColor Green
          }
